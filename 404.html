<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Ethereal — 404</title>
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050607;
      --border: rgba(255,255,255,.14);
      --border-2: rgba(255,255,255,.09);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --radius: 22px;
      --shadow: 0 18px 55px rgba(0,0,0,.68);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      --space: "Space Mono", var(--mono);

      --sa-left: env(safe-area-inset-left);
      --sa-right: env(safe-area-inset-right);
      --safeX: 16px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; width:100%; overflow-x: clip; }
    @supports not (overflow: clip){
      html,body{ overflow-x:hidden; }
    }

    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 70% 20%, rgba(255,255,255,.035), transparent 60%),
        radial-gradient(900px 700px at 20% 80%, rgba(255,255,255,.025), transparent 64%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-y:auto;
      -webkit-text-size-adjust: 100%;
    }

    canvas#bg{
      position:fixed;
      inset:0;
      z-index:0;
      width:100%;
      height:100%;
      pointer-events:none;
      opacity:.95;
    }

    .vignette{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0), rgba(0,0,0,.62) 70%, rgba(0,0,0,.84) 100%);
    }

    .stage{
      position:relative;
      z-index:2;
      min-height: 100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      --pad: clamp(16px, 3vw, 40px);

      padding-left: var(--safeX);
      padding-right: var(--safeX);
      padding-top: calc(var(--pad) + env(safe-area-inset-top));
      padding-bottom: calc(var(--pad) + env(safe-area-inset-bottom));
    }

    @media (max-height: 720px){
      .stage{ align-items:flex-start; }
    }

    .frame{
      position:relative;
      width:min(920px, 100%);
      margin: 0 auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: visible;

      background: rgba(0,0,0,.52);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      opacity:0;
      transform: translateY(14px) scale(.99);
      animation: frameIn .75s cubic-bezier(.2,.9,.25,1) .12s forwards;
    }

    @keyframes frameIn{ to{ opacity:1; transform:none; } }

    .frame-inner{
      position:relative;
      padding: clamp(18px, 3vw, 34px);
      border-radius: var(--radius);
    }

    h1{
      margin:0;
      font-size: clamp(28px, 3.2vw, 44px);
      line-height:1.05;
      letter-spacing:-0.02em;
      font-family: var(--space);
      font-weight: 300;
    }

    .sub{
      margin: 12px 0 0;
      color: var(--muted);
      font-size: clamp(14px, 1.4vw, 16px);
      line-height:1.55;
      max-width: 72ch;
      font-family: var(--space);
      font-weight: 400;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
      margin: 18px 0;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items:start;
    }

    .card{
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      background: rgba(10, 12, 16, .44);
      padding: 16px;
      position:relative;
      overflow: visible;
    }

    .label{
      display:block;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,.70);
      letter-spacing: .08em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .code404{
      font-family: var(--space);
      font-weight: 700;
      letter-spacing: -0.04em;
      font-size: clamp(54px, 7vw, 96px);
      line-height: 0.95;
      margin: 6px 0 12px;
      color: rgba(255,255,255,.92);
      text-shadow: 0 14px 55px rgba(0,0,0,.55);
    }

    .explain{
      margin: 0 0 10px;
      color: rgba(255,255,255,.72);
      font-size: clamp(14px, 1.55vw, 16px);
      line-height: 1.6;
      max-width: 75ch;
      font-family: var(--space);
    }

    .pathline{
      margin: 0 0 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,.62);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.30);
      max-width: 100%;
      overflow:hidden;
    }

    .pill code{
      font-family: var(--mono);
      color: rgba(255,255,255,.78);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: min(68ch, 100%);
    }

    .btn{
      width:100%;
      border:0;
      cursor:pointer;
      border-radius: 999px;
      padding: 14px 16px;
      min-height: 48px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing:.02em;
      color: rgba(0,0,0,.92);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(220px 90px at 30% 0%, rgba(255,255,255,.92), rgba(255,255,255,0) 55%),
        linear-gradient(90deg, rgba(245,245,245,.92), rgba(190,190,190,.86), rgba(140,140,140,.82));
      box-shadow:
        0 18px 45px rgba(0,0,0,.70),
        0 0 0 1px rgba(255,255,255,.14) inset;
      position:relative;
      overflow:hidden;
      transition: transform .16s ease, filter .16s ease;
      user-select:none;
      touch-action: manipulation;
    }

    .btn::after{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(140px 70px at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,.25), transparent 60%);
      opacity:0;
      transition: opacity .2s ease;
    }

    .btn:hover{ transform: translateY(-2px); filter: brightness(1.04); }
    .btn:hover::after{ opacity:1; }
    .btn:active{ transform: translateY(0px) scale(.995); }

    .btn .btn-inner{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .btn .dot{
      width:10px; height:10px;
      border-radius:999px;
      background: rgba(0,0,0,.62);
      box-shadow: 0 0 0 2px rgba(255,255,255,.35);
    }

    :focus-visible{
      outline: 2px solid rgba(255,255,255,.55);
      outline-offset: 3px;
    }

    @media (max-width: 520px){
      .frame{ border-radius: 18px; }
      .frame-inner{ padding: 16px; }
      .card{ border-radius: 18px; }
      .divider{ margin: 16px 0; }
    }

    @media (prefers-reduced-motion: reduce){
      .frame{ animation:none; opacity:1; transform:none; }
      .btn{ transition:none; }
    }
  </style>
</head>

<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main class="stage">
    <section class="frame" aria-label="404">
      <div class="frame-inner">
        <h1>Ethereal</h1>
        <p class="sub">The Future</p>

        <div class="divider"></div>

        <div class="grid">
          <div class="card">
            <span class="label">Страница не найдена</span>

            <div class="code404">404</div>

            <p class="explain">
              Ты пришёл по адресу, которого не существует. Либо ссылка кривая, либо страницу снесли,
              либо сервер делает вид, что всё нормально (он врёт).
            </p>

            <div class="pathline">
              <span class="pill">Запрос: <code id="path">/</code></span>
              <span class="pill">Статус: <code>NOT FOUND</code></span>
            </div>

            <a class="btn" id="homeBtn" href="index.html" aria-label="Вернуться на главную страницу">
              <span class="btn-inner">
                <span class="dot" aria-hidden="true"></span>
                <span>Вернуться на главную</span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    function applySafeX(){
      const root = document.documentElement;
      const cs = getComputedStyle(root);
      const left = parseFloat(cs.getPropertyValue("--sa-left")) || 0;
      const right = parseFloat(cs.getPropertyValue("--sa-right")) || 0;
      const base = 16;
      const x = Math.max(base, left, right);
      root.style.setProperty("--safeX", x + "px");
    }

    const pathEl = document.getElementById("path");
    pathEl.textContent = (location.pathname || "/") + (location.search || "") + (location.hash || "");

    const homeBtn = document.getElementById("homeBtn");
    homeBtn.addEventListener("pointermove", (e) => {
      const r = homeBtn.getBoundingClientRect();
      const mx = ((e.clientX - r.left) / r.width) * 100;
      const my = ((e.clientY - r.top) / r.height) * 100;
      homeBtn.style.setProperty("--mx", mx + "%");
      homeBtn.style.setProperty("--my", my + "%");
    }, { passive: true });

    const bg = document.getElementById("bg");
    const ctx = bg.getContext("2d", { alpha: false, desynchronized: true });

    const glyphs = "01{}[]();=>/\\*+-_#@~$<>|:^.,";
    const keywords = ["ethereal::", "void()", "compile()", "async", "null", "0xDEAD", "signal", "stack", "heap"];

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const mqMobile = window.matchMedia("(max-width: 820px)");

    let columns = [];
    let fontSize = 14;
    let colWidth = 12;
    let lastT = 0;

    function rand(min,max){ return Math.random()*(max-min)+min; }
    function randi(min,max){ return Math.floor(rand(min, max+1)); }

    function resizeBg(){
      const DPR = Math.min(1.6, window.devicePixelRatio || 1);
      bg.width = Math.floor(innerWidth * DPR);
      bg.height = Math.floor(innerHeight * DPR);
      ctx.setTransform(DPR,0,0,DPR,0,0);

      const cssW = innerWidth;
      const cssH = innerHeight;

      fontSize = mqMobile.matches ? 13 : 14;
      colWidth = Math.max(10, Math.floor(fontSize * 0.9));
      const cols = Math.floor(cssW / colWidth);

      columns = Array.from({length: cols}, (_, i) => ({
        x: i * colWidth,
        y: rand(-cssH, 0),
        speed: rand(mqMobile.matches ? 38 : 55, mqMobile.matches ? 95 : 140),
        density: rand(0.45, 0.75),
        seed: Math.random() * 9999
      }));

      ctx.fillStyle = "#050607";
      ctx.fillRect(0,0,cssW,cssH);
    }

    function pickLine(){
      if(Math.random() < 0.08) return keywords[randi(0, keywords.length-1)];
      const len = randi(8, 22);
      let s = "";
      for(let i=0;i<len;i++) s += glyphs[randi(0, glyphs.length-1)];
      return s;
    }

    function draw(t){
      const cssW = innerWidth;
      const cssH = innerHeight;

      const targetFPS = reduceMotion ? 12 : (mqMobile.matches ? 40 : 60);
      const minDt = 1000 / targetFPS;

      if(!lastT) lastT = t;
      const dtMs = t - lastT;
      if(dtMs < minDt){
        requestAnimationFrame(draw);
        return;
      }
      const dt = Math.min(0.06, dtMs/1000);
      lastT = t;

      const fade = reduceMotion ? 0.18 : 0.10;
      ctx.fillStyle = `rgba(5,6,7,${fade})`;
      ctx.fillRect(0,0,cssW,cssH);

      ctx.font = `${fontSize}px ${getComputedStyle(document.documentElement).getPropertyValue("--mono")}`;
      ctx.textBaseline = "top";

      for(const c of columns){
        c.y += c.speed * dt;
        if(Math.random() > c.density) continue;

        const line = pickLine();
        const alpha = rand(0.06, 0.16);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;

        const jitter = Math.sin((t*0.001)+c.seed) * 0.6;
        ctx.fillText(line, c.x + jitter, c.y);

        if(c.y > cssH + 40){
          c.y = rand(-cssH*0.35, -20);
          c.speed = rand(mqMobile.matches ? 38 : 55, mqMobile.matches ? 95 : 140);
          c.density = rand(0.45, 0.75);
        }
      }

      requestAnimationFrame(draw);
    }

    applySafeX();
    window.addEventListener("resize", applySafeX, { passive:true });
    window.addEventListener("orientationchange", applySafeX);

    let rq = false;
    window.addEventListener("resize", () => {
      if(rq) return;
      rq = true;
      requestAnimationFrame(() => {
        rq = false;
        resizeBg();
      });
    }, { passive:true });

    resizeBg();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
